name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            docker_tag: aarch64
          - arch: arm
            docker_tag: arm
          - arch: x86_64
            docker_tag: latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Pull Termux Docker image
        run: docker pull termux/termux-docker:${{ matrix.docker_tag }}

      - name: Build ACP natively inside Termux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/builder/acp" \
            termux/termux-docker:${{ matrix.docker_tag }} \
            bash -lc '
              set -e
              pkg update -y
              pkg install -y clang make git
              cd /home/builder/acp
              make clean
              make CC=clang CFLAGS="-Wall -Wextra -O2 -std=c11"
              file ./acp
              ./acp --version
              mkdir -p dist
              cp ./acp "dist/acp-${{ matrix.arch }}"
            '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-${{ matrix.arch }}
          path: dist/acp-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find dist -type f -name "acp-*" -exec cp {} release/ \;
          cd release
          for f in acp-*; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false