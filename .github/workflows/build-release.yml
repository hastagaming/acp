name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-termux:
    name: Build Termux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            docker_tag: aarch64
          - arch: arm
            docker_tag: arm
          - arch: x86_64
            docker_tag: latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Pull Termux Docker image
        run: docker pull termux/termux-docker:${{ matrix.docker_tag }}

      - name: Prepare output directory
        run: mkdir -p "${{ github.workspace }}/dist"

      # This builds inside the official termux/termux-docker image, linking
      # against Termux's own Bionic libc toolchain. The resulting binary is
      # compatible with real Termux installs on Android, which a binary
      # built directly on the ubuntu-latest host (glibc) would NOT be.
      #
      # The repo is mounted read-only at /mnt/src; the container copies it
      # into its own $HOME first and builds there, since the mounted path
      # is owned by the GitHub runner's UID and the Termux container user
      # cannot write into it directly (this previously caused
      # "ld.lld: error: cannot open output file acp: Permission denied").
      #
      # The built binary is then extracted with "docker cp" from the host
      # side (after the container exits) instead of writing into a bind
      # mount from inside the container, since writing into a mount from
      # inside a QEMU-emulated container (needed for aarch64/arm) hit the
      # same UID mismatch even when the mount was read-write. The absolute
      # path to the binary inside the container is resolved dynamically
      # with "pwd" instead of assuming a hardcoded Termux $HOME path, since
      # that path is an implementation detail of the Docker image that
      # could differ between tags or future versions.
      - name: Build ACP natively inside Termux container
        run: |
          docker run \
            --name acp-build-${{ matrix.arch }} \
            -v "${{ github.workspace }}:/mnt/src:ro" \
            termux/termux-docker:${{ matrix.docker_tag }} \
            bash -lc '
              set -e
              pkg update -y
              pkg install -y clang make git
              cp -r /mnt/src "$HOME/acp-build"
              cd "$HOME/acp-build"
              make clean
              make CC=clang CFLAGS="-Wall -Wextra -O2 -std=c11"
              ls -la ./acp
              ./acp --version
              pwd > /tmp/acp-build-dir.txt
            '
          BUILD_DIR="$(docker exec "acp-build-${{ matrix.arch }}" cat /tmp/acp-build-dir.txt)"
          docker cp \
            "acp-build-${{ matrix.arch }}:${BUILD_DIR}/acp" \
            "${{ github.workspace }}/dist/acp-termux-${{ matrix.arch }}"

      - name: Remove build container
        if: always()
        run: docker rm -f "acp-build-${{ matrix.arch }}" || true

      - name: Upload Termux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-termux-${{ matrix.arch }}
          path: dist/acp-termux-${{ matrix.arch }}
          if-no-files-found: error

  build-linux-desktop:
    name: Build Linux desktop (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # This builds directly on the GitHub-hosted Ubuntu runner using its
      # native gcc/glibc toolchain. The resulting binary targets regular
      # Linux desktops/servers (Ubuntu, Debian, etc.) and will NOT run on
      # Termux/Android, since Termux uses Bionic libc instead of glibc.
      - name: Build ACP natively on Ubuntu
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc make
          make clean
          make CC=gcc CFLAGS="-Wall -Wextra -O2 -std=c11"
          ls -la ./acp
          ./acp --version
          mkdir -p dist
          cp ./acp "dist/acp-linux-${{ matrix.arch }}"

      - name: Upload Linux desktop build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-linux-${{ matrix.arch }}
          path: dist/acp-linux-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-termux, build-linux-desktop]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find dist -type f -name "acp-*" -exec cp {} release/ \;
          cd release
          for f in acp-*; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false